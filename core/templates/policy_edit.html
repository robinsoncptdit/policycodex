{% extends "base.html" %}

{% block title %}Edit {{ policy.slug }} | PolicyCodex{% endblock %}

{% block content %}
  <h2>Edit policies/{{ policy.slug }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Open PR</button>
    <a href="{% url 'catalog' %}">Cancel</a>
  </form>
{% endblock %}
