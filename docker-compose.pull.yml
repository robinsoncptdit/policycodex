# Profile B: pull a pre-built published image (boxed ship for non-developer
# dioceses). The image below is NOT published yet; registry publishing is a
# post-DISC follow-up. This file is validated by `docker compose config`;
# it will run once the image is pushed. Until then, use docker-compose.yml.
services:
  app:
    image: ghcr.io/robinsoncptdit/policycodex:latest
    env_file:
      - .env
    ports:
      - "${POLICYCODEX_PORT:-8000}:${POLICYCODEX_PORT:-8000}"
    volumes:
      - policycodex-data:/data
      # Legacy credentials mount (read-only). The DISC-02 Fernet store under /data
      # is the authoritative source; no app code reads /secrets today. Kept as an
      # inert fallback slot for manual, out-of-band key placement only.
      - ${HOME}/.config/policycodex:/secrets:ro
    restart: unless-stopped

volumes:
  policycodex-data:
