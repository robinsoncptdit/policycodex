name: Foundational policy guard

on:
  pull_request:
    branches: [main]
    paths:
      - 'policies/**'
  # REPO-12: lets a maintainer re-run the guard manually after a
  # workflow-only fix-forward that the path filter above would miss:
  #   gh workflow run foundational-guard.yml --ref main
  workflow_dispatch:

jobs:
  foundational-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install "pyyaml>=6.0"
      - name: Run the foundational-policy guard
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python .github/scripts/foundational_guard.py
