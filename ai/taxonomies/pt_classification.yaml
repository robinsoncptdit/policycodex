# Diocese of Pensacola-Tallahassee: classification + retention seed
#
# Sourced from `internal/Document Retention Policy.pdf` (rev. Aug, 2022).
# Section 3.0 -> classifications. Appendix A -> retention_schedule.
#
# In v0.1, classifications and retention_schedule are independent axes.
# The AI extraction prompt receives both as context (see AI-11).
#
# Retention values are FREE-TEXT STRINGS preserved verbatim from the PDF.
# v0.1 does not normalize ("Permanent", "Termination + 4 years", etc.).
#
# When the Week-3 foundational-policy bundle scaffolding lands, this file
# moves to `policies/document-retention/data.yaml`. The schema is unchanged.

