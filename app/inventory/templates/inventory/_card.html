<div class="card bg-base-200 shadow-sm">
  <div class="card-body p-3">
    <div class="text-xs text-base-content/60 truncate">{{ item.source_filename }}</div>
    {% if item.status == "done" %}
      <div class="font-medium truncate">{{ item.title }}</div>
      <div class="text-xs">{{ item.classification }}</div>
    {% elif item.status == "extracting" %}
      <div class="loading loading-spinner loading-sm"></div>
      <div class="text-xs">Extracting&hellip;</div>
    {% elif item.status == "failed" %}
      <div class="badge badge-error">Failed</div>
      <div class="text-xs mb-2">{{ item.error_message }}</div>
      <form method="post" action="{% url 'inventory_retry_item' item.pk %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-xs btn-outline">Retry</button>
      </form>
    {% else %}
      <div class="text-xs text-base-content/60">Pending</div>
    {% endif %}
  </div>
</div>
