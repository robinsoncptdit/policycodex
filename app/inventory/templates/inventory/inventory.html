{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container mx-auto py-8">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold">Inventory</h1>
    <a href="#bucket" id="add-policies" class="btn btn-primary btn-sm">Add policies</a>
  </div>

  {% if error %}<div class="alert alert-warning mb-4">{{ error }}</div>{% endif %}

  {% if run %}
    <div id="inventory-status"
         hx-get="{% url 'htmx_inventory_status' %}?run={{ run.pk }}"
         hx-trigger="every 2s"
         hx-swap="innerHTML">
      {% include "inventory/_status.html" %}
    </div>
  {% endif %}

  {% include "inventory/_bucket.html" %}
</div>
{% endblock %}

{% block extra_scripts %}
  <script src="{% static 'js/inventory-upload.js' %}" defer></script>
{% endblock %}
