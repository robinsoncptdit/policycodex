{% if message %}<div class="alert alert-success mb-4" data-role="panel-success">{{ message }}{% if pr_url %} <a href="{{ pr_url }}" class="link font-semibold" target="_blank" rel="noopener">View PR</a>{% endif %}</div>{% endif %}
{% if success %}<div class="alert alert-success mb-4" data-role="panel-success">{{ success }}</div>{% endif %}
{% if error %}<div class="alert alert-warning mb-4" data-role="panel-error">{{ error }}</div>{% endif %}
{% if message or success %}
<script>
  setTimeout(() => {
    document.querySelectorAll('[data-role="panel-success"]').forEach(el => {
      el.style.transition = 'opacity 400ms';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 450);
    });
  }, 5000);
</script>
{% endif %}
