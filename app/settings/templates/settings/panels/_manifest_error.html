{% extends "settings/base_settings.html" %}
{% block panel_content %}
<div class="alert alert-error mb-4">{{ error }}</div>
{% if can_retry %}
  <a href="{{ retry_url }}" class="btn btn-primary">Retry conversion (attempt {{ retry_count }} of 3)</a>
{% else %}
  <a href="/settings/github-app/manifest/start/" class="btn btn-outline">Start over</a>
{% endif %}
{% endblock %}
