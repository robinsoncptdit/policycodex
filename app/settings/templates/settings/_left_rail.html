<nav class="w-64 pr-6 border-r border-base-300">
  {% for group_name, items in nav_groups %}
    <div class="mb-4">
      <div class="text-xs uppercase tracking-wide text-base-content/60 mb-2">{{ group_name }}</div>
      <ul class="space-y-1">
        {% for item in items %}
          <li>
            <a href="{% url 'settings_panel' slug=item.slug %}"
               data-configured="{% if item.is_configured and item.slug != 'reset' %}true{% else %}false{% endif %}"
               class="flex items-center gap-2 px-2 py-1 rounded {% if item.slug == active_slug %}bg-base-200 font-medium{% else %}hover:bg-base-200{% endif %}">
              <span>{{ item.title }}</span>
              {% if item.is_configured and item.slug != 'reset' %}
                <span class="text-success text-xs">✓</span>
              {% endif %}
            </a>
          </li>
        {% endfor %}
      </ul>
    </div>
  {% endfor %}
</nav>
